server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: novel-analyzer-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:novel_analyzer}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO

app:
  auth:
    demo-username: ${APP_DEMO_USERNAME:admin}
    demo-password: ${APP_DEMO_PASSWORD:admin123}
    jwt-secret: ${JWT_SECRET:dev-jwt-secret-change-me-please-32-characters}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:7200}
  security:
    rate-limit-per-minute: ${SECURITY_RATE_LIMIT_PER_MINUTE:100}
    auto-blacklist-threshold: ${SECURITY_AUTO_BLACKLIST_THRESHOLD:20}
    blacklist-seconds: ${SECURITY_BLACKLIST_SECONDS:86400}
    protected-path-prefixes:
      - /api/secure
      - /api/crawler
      - /api/analysis
      - /api/config
    whitelist-paths:
      - /api/system/health
      - /api/auth/login
      - /api/auth/refresh
  crawler:
    base-url: ${CRAWLER_BASE_URL:http://127.0.0.1:5000}
    connect-timeout-millis: ${CRAWLER_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${CRAWLER_READ_TIMEOUT_MILLIS:15000}
