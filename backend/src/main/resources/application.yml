server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: novel-analyzer-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:novel_analyzer}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO

app:
  cloudflare:
    turnstile:
      enabled: ${CLOUDFLARE_TURNSTILE_ENABLED:false}
      site-key: ${CLOUDFLARE_TURNSTILE_SITE_KEY:}
      secret-key: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:}
      verify-url: ${CLOUDFLARE_TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
      expected-hostname: ${CLOUDFLARE_TURNSTILE_EXPECT_HOSTNAME:}
  auth:
    demo-enabled: ${APP_DEMO_ENABLED:false}
    demo-username: ${APP_DEMO_USERNAME:}
    demo-password: ${APP_DEMO_PASSWORD:}
    jwt-secret: ${JWT_SECRET:}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:900}
    refresh-token-expire-seconds: ${JWT_REFRESH_TOKEN_EXPIRE_SECONDS:604800}
    session-max-devices: ${AUTH_SESSION_MAX_DEVICES:3}
    refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:refresh_token}
    refresh-cookie-path: ${AUTH_REFRESH_COOKIE_PATH:/api/auth}
    refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:true}
    refresh-cookie-same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Strict}
  sms-auth:
    enabled: ${ALIYUN_DYPNS_ENABLED:false}
    access-key-id: ${ALIYUN_DYPNS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_DYPNS_ACCESS_KEY_SECRET:}
    endpoint: ${ALIYUN_DYPNS_ENDPOINT:dypnsapi.aliyuncs.com}
    country-code: ${ALIYUN_DYPNS_COUNTRY_CODE:86}
    scheme-name: ${ALIYUN_DYPNS_SCHEME_NAME:noval-web}
    sign-name: ${ALIYUN_DYPNS_SIGN_NAME:}
    template-code-register: ${ALIYUN_DYPNS_TEMPLATE_CODE_REGISTER:}
    template-code-login: ${ALIYUN_DYPNS_TEMPLATE_CODE_LOGIN:}
    template-code-reset-password: ${ALIYUN_DYPNS_TEMPLATE_CODE_RESET_PASSWORD:}
    valid-time-minutes: ${ALIYUN_DYPNS_VALID_TIME_MINUTES:5}
    interval-seconds: ${ALIYUN_DYPNS_INTERVAL_SECONDS:60}
    phone-window-seconds: ${SMS_RISK_PHONE_WINDOW_SECONDS:600}
    phone-max-attempts: ${SMS_RISK_PHONE_MAX_ATTEMPTS:3}
    ip-window-seconds: ${SMS_RISK_IP_WINDOW_SECONDS:600}
    ip-max-attempts: ${SMS_RISK_IP_MAX_ATTEMPTS:5}
    biz-window-seconds: ${SMS_RISK_BIZ_WINDOW_SECONDS:1800}
    biz-max-attempts: ${SMS_RISK_BIZ_MAX_ATTEMPTS:3}
  security:
    rate-limit-per-minute: ${SECURITY_RATE_LIMIT_PER_MINUTE:100}
    auto-blacklist-threshold: ${SECURITY_AUTO_BLACKLIST_THRESHOLD:20}
    blacklist-seconds: ${SECURITY_BLACKLIST_SECONDS:86400}
    password-login-phone-window-seconds: ${SECURITY_PASSWORD_LOGIN_PHONE_WINDOW_SECONDS:600}
    password-login-phone-max-failures: ${SECURITY_PASSWORD_LOGIN_PHONE_MAX_FAILURES:6}
    password-login-ip-window-seconds: ${SECURITY_PASSWORD_LOGIN_IP_WINDOW_SECONDS:600}
    password-login-ip-max-failures: ${SECURITY_PASSWORD_LOGIN_IP_MAX_FAILURES:20}
    password-login-phone-ip-window-seconds: ${SECURITY_PASSWORD_LOGIN_PHONE_IP_WINDOW_SECONDS:600}
    password-login-phone-ip-max-failures: ${SECURITY_PASSWORD_LOGIN_PHONE_IP_MAX_FAILURES:4}
    password-login-cooldown-seconds: ${SECURITY_PASSWORD_LOGIN_COOLDOWN_SECONDS:900}
    trusted-proxy-ips: ${SECURITY_TRUSTED_PROXY_IPS:}
    protected-path-prefixes:
      - /api/auth
      - /api/secure
      - /api/system
      - /api/crawler
      - /api/analysis
      - /api/config
      - /api/data
    whitelist-paths:
      - /api/system/health
      - /api/system/auth-public-config
      - /api/auth/login
      - /api/auth/login/password
      - /api/auth/login/sms
      - /api/auth/register
      - /api/auth/sms/send
      - /api/auth/password/reset
      - /api/auth/refresh
      - /api/auth/logout
  crawler:
    base-url: ${CRAWLER_BASE_URL:http://127.0.0.1:5000}
    internal-api-key: ${CRAWLER_INTERNAL_API_KEY:}
    connect-timeout-millis: ${CRAWLER_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${CRAWLER_READ_TIMEOUT_MILLIS:60000}
  ai:
    provider-type: ${AI_PROVIDER_TYPE:openai-compatible}
    dify-base-url: ${DIFY_BASE_URL:https://api.dify.ai/v1}
    dify-api-key-ref: ${DIFY_API_KEY_REF:}
    fallback-model: ${AI_FALLBACK_MODEL:local-fallback}
    timeout-millis: ${AI_TIMEOUT_MILLIS:15000}
    langgraph-worker:
      base-url: ${AI_LANGGRAPH_WORKER_BASE_URL:http://127.0.0.1:8001}
      internal-api-key: ${AI_LANGGRAPH_WORKER_INTERNAL_API_KEY:}
      timeout-millis: ${AI_LANGGRAPH_WORKER_TIMEOUT_MILLIS:30000}
    openai-compatible:
      base-url: ${AI_OPENAI_COMPATIBLE_BASE_URL:https://api.deepseek.com/v1}
      api-key-ref: ${AI_OPENAI_COMPATIBLE_API_KEY_REF:DEEPSEEK_API_KEY}
      default-model: ${AI_OPENAI_COMPATIBLE_DEFAULT_MODEL:deepseek-chat}
      streaming-enabled: ${AI_OPENAI_COMPATIBLE_STREAMING_ENABLED:true}
