spring:
  sql:
    init:
      encoding: UTF-8

app:
  auth:
    jwt-secret: test-jwt-secret-should-be-long-enough-1234567890
    demo-enabled: false
    access-token-expire-seconds: 900
    refresh-token-expire-seconds: 604800
    session-max-devices: 3
    refresh-cookie-name: refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-secure: true
    refresh-cookie-same-site: Strict
  security:
    protected-path-prefixes:
      - /api/auth
      - /api/secure
      - /api/crawler
      - /api/analysis
      - /api/config
      - /api/data
    whitelist-paths:
      - /api/system/health
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
  crawler:
    base-url: http://127.0.0.1:5000
    internal-api-key: crawler-internal-test-key-1234567890
