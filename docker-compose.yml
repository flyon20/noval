version: "3.8"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - crawler
    environment:
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: novel_analyzer
      MYSQL_USER: ${MYSQL_USER:-novel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-novel123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-novelredis123}
      CRAWLER_BASE_URL: http://crawler:5000
      CRAWLER_INTERNAL_API_KEY: ${CRAWLER_INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me-please-32-characters}
      DIFY_BASE_URL: ${DIFY_BASE_URL:-https://api.dify.ai/v1}
      DIFY_API_KEY_REF: ${DIFY_API_KEY_REF:-DIFY_API_KEY}
    restart: unless-stopped

  crawler:
    build:
      context: ./crawler
    environment:
      CRAWLER_INTERNAL_API_KEY: ${CRAWLER_INTERNAL_API_KEY}
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: novel_analyzer
      MYSQL_USER: ${MYSQL_USER:-novel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-novel123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/mysql:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["sh", "-c", "redis-server /usr/local/etc/redis/redis.conf --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-novelredis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
